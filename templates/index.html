<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Release Notes</title>
  <meta name="description" content="Browse the latest Google BigQuery release notes and share them on Twitter/X." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Theme Toggle -->
    <div class="theme-toggle-container">
      <button id="btn-theme-toggle" class="theme-toggle-btn" aria-label="Przełącz motyw" type="button">
        <!-- Sun icon (shows in dark mode to switch to light) -->
        <svg class="theme-icon theme-icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon icon (shows in light mode to switch to dark) -->
        <svg class="theme-icon theme-icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>

    <!-- Header -->
    <header class="app-header">
      <div class="app-header__logo">
        <span class="app-header__icon">📋</span>
        <h1>BigQuery Release Notes</h1>
      </div>
      <p>Stay up to date with the latest BigQuery changes &amp; share them with your network.</p>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar__left">
        <button id="btn-refresh" class="btn btn--primary" type="button">
          <span class="spinner"></span>
          <span class="btn__label">Refresh</span>
        </button>
        <button id="btn-export" class="btn btn--secondary" type="button" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Eksportuj CSV</span>
        </button>
        <span id="note-count" class="toolbar__count"></span>
      </div>
      <button id="btn-tweet" class="btn btn--tweet" type="button" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        <span>Tweet</span>
      </button>
    </div>

    <!-- Filters & Search -->
    <div class="filter-bar">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="Filtruj notatki (np. Gemini, embeddings...)" aria-label="Wyszukaj notatki" />
      </div>
      <div class="filter-chips">
        <button class="chip active" data-filter="all" type="button">Wszystkie</button>
        <button class="chip" data-filter="feature" type="button">Features</button>
        <button class="chip" data-filter="issue" type="button">Issues</button>
        <button class="chip" data-filter="announcement" type="button">Announcements</button>
      </div>
    </div>

    <!-- Feed container -->
    <section id="feed" class="feed-list" aria-live="polite"></section>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
